<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Etec Júlio de Mesquita</title>

    <!-- Fonte e ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a2d9d6b6f9.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />


    <link rel="stylesheet" href="../CSS/login.css">
</head>

<body>
    <div class="login-container">
        <!-- Seção de Logos -->
        <div class="logo-section">
            <img src="../Assets/etec2.png" alt="Logo Etec Júlio de Mesquita Santo André">
            <img src="../Assets/etec.png" alt="Logo Centro Paula Souza">
        </div>

        <!-- Seção de Login -->
        <div class="form-section" id="formSection">
            <a href="index.html" class="home-link"><span class="material-symbols-outlined">
                home
                </span> Home</a>
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" required placeholder="">
                    <label for="email">Email</label>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senha" required placeholder="">
                    <label for="senha">Senha</label>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
            <a class="forgot-password" id="forgotPassword">Esqueceu a senha?</a>
        </div>
    </div>
        <div vw="" class="enabled"
            style="left: initial; right: 0px; top: 50%; bottom: initial; transform: translateY(calc(-50% - 10px));">
            <div vw-access-button="" class="active">
                <img class="vp-access-button" data-src="assets/access_icon.svg"
                    alt="Conteúdo acessível em Libras usando o VLibras Widget com opções dos Avatares Ícaro, Hosana ou Guga."
                    src="https://vlibras.gov.br/app//assets/access_icon.svg">
                <img class="vp-pop-up" data-src="assets/access_popup.jpg"
                    alt="Conteúdo acessível em Libras usando o VLibras Widget com opções dos Avatares Ícaro, Hosana ou Guga."
                    src="https://vlibras.gov.br/app//assets/access_popup.jpg">
            </div>
            <div vw-plugin-wrapper="" class="" style="background: rgb(235, 235, 235);">
                <div vp="">
                </div>
            </div>
        </div>
        <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
        <script>
            new window.VLibras.Widget('https://vlibras.gov.br/app');
            
        </script>
    <script src="../JS (Front-End)/forgotPassword.js"> </script>
    <script src="../JS (Front-End)/login.js"></script>
    <script src="../../JS (Front-End)/botao_topo.js"></script>
</body>

</html>
